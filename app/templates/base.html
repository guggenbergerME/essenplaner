<!DOCTYPE html>
<html lang="de" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}essenplaner{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', path='css/style.css') }}?v=2">
    {% block head %}{% endblock %}
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="container">
            <a href="/" class="header__logo">essenplaner</a>
            <nav class="header__nav">
                {% block nav %}{% endblock %}
                <button class="theme-toggle" onclick="toggleTheme()" title="Tag/Nacht-Modus umschalten">
                    <span class="theme-toggle__icon theme-toggle__icon--light">&#9788;</span>
                    <span class="theme-toggle__icon theme-toggle__icon--dark">&#9790;</span>
                </button>
            </nav>
        </div>
    </header>

    <!-- Main -->
    <main class="main">
        <div class="container">
            {% block content %}{% endblock %}
        </div>
    </main>

    <!-- Footer -->
    {% include "components/footer.html" %}

    <!-- Bug-Melde-Modus (DEV_MODE) -->
    {% if dev_mode %}
    {% include "components/bug_report.html" %}
    {% endif %}

    <!-- Theme Toggle Script -->
    <script>
    function toggleTheme() {
        const html = document.documentElement;
        const current = html.getAttribute('data-theme');
        const next = current === 'dark' ? 'light' : 'dark';
        html.setAttribute('data-theme', next);
        localStorage.setItem('theme', next);
    }

    // Gespeichertes Theme laden
    (function() {
        const saved = localStorage.getItem('theme');
        if (saved) {
            document.documentElement.setAttribute('data-theme', saved);
        } else if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
            document.documentElement.setAttribute('data-theme', 'dark');
        }
    })();
    </script>

    {% block scripts %}{% endblock %}
</body>
</html>
