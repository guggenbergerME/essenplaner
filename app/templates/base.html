<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}essenplaner{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', path='css/style.css') }}">
    {% block head %}{% endblock %}
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="container">
            <a href="/" class="header__logo">essenplaner</a>
            <nav class="header__nav">
                {% block nav %}{% endblock %}
            </nav>
        </div>
    </header>

    <!-- Main -->
    <main class="main">
        <div class="container">
            {% block content %}{% endblock %}
        </div>
    </main>

    <!-- Footer -->
    {% include "components/footer.html" %}

    <!-- Bug-Melde-Modus (DEV_MODE) -->
    {% if dev_mode %}
    {% include "components/bug_report.html" %}
    {% endif %}

    {% block scripts %}{% endblock %}
</body>
</html>
